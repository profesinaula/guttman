<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalograma de Guttman Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 { font-size: 24px; color: #262626; margin-bottom: 5px; }
        p.subtitle { color: #8e8e8e; font-size: 14px; margin-bottom: 25px; }

        /* CONFIGURACIÓN INICIAL */
        .setup-section {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            background: #fafafa;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #efefef;
        }

        .input-group { text-align: left; }
        .input-group label { font-size: 11px; font-weight: 800; color: #8e8e8e; text-transform: uppercase; margin-left: 5px; }

        input[type="number"] {
            display: block;
            padding: 10px;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            width: 110px;
            margin-top: 5px;
        }

        /* TABLA DE ANÁLISIS */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 12px;
            border: 1px solid #efefef;
        }

        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8f9fa; padding: 12px; font-size: 12px; color: #262626; border: 1px solid #eee; }
        td { padding: 8px; border: 1px solid #eee; }

        .cell-input {
            width: 45px;
            padding: 8px;
            border: 1px solid transparent;
            text-align: center;
            font-weight: 600;
            border-radius: 4px;
        }
        .cell-input:focus { background: #fff5f8; border: 1px solid #d6249f; }

        /* BOTONES */
        .actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        
        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-main { background: #0095f6; color: white; }
        .btn-sort { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743); color: white; }
        button:hover { opacity: 0.9; transform: scale(1.02); }

        .row-sum { font-weight: bold; background: #fff5eb; color: #e67e22; }
        .col-sum { font-weight: bold; background: #ebf5ff; color: #2980b9; }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #8e8e8e;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Escalograma de Guttman</h1>
    <p class="subtitle">Análisis de Reproducibilidad y Jerarquía</p>

    <div id="step1" class="setup-section">
        <div class="input-group">
            <label>N° Sujetos</label>
            <input type="number" id="sujetos" min="1" value="4">
        </div>
        <div class="input-group">
            <label>N° Ítems</label>
            <input type="number" id="items" min="1" value="5">
        </div>
        <button class="btn-main" style="margin-top:20px" onclick="crearTabla()">Generar Matriz</button>
    </div>

    <div id="step2" style="display:none;">
        <div class="table-container">
            <table>
                <thead>
                    <tr id="headerRow"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
                <tfoot id="footerRow"></tfoot>
            </table>
        </div>

        <div class="actions">
            <button class="btn-sort" onclick="autoOrdenar()">Ordenar y Analizar</button>
            <button onclick="location.reload()" style="background:#efefef; color:#262626;">Limpiar</button>
        </div>
    </div>

    <a href="index.html" class="back-link">← Volver al Panel de Control</a>
</div>

<script>
    function crearTabla() {
        const nSujetos = parseInt(document.getElementById('sujetos').value);
        const nItems = parseInt(document.getElementById('items').value);

        // Generar Cabecera
        const header = document.getElementById('headerRow');
        header.innerHTML = '<th>Sujetos</th>';
        for (let i = 1; i <= nItems; i++) {
            header.innerHTML += `<th class="item-label">I${i}</th>`;
        }
        header.innerHTML += '<th style="background:#6c5ce7; color:white">Σ</th>';

        // Generar Filas
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        for (let s = 1; s <= nSujetos; s++) {
            let row = `<tr><td class="sujeto-label" style="font-weight:600">S${s}</td>`;
            for (let i = 1; i <= nItems; i++) {
                row += `<td><input type="number" class="cell-input" value="0" min="0" max="1"></td>`;
            }
            row += `<td class="row-sum">0</td></tr>`;
            body.innerHTML += row;
        }

        // Pie de tabla (Totales por ítem)
        const footer = document.getElementById('footerRow');
        let fRow = `<tr><td style="font-weight:800">Total</td>`;
        for (let i = 1; i <= nItems; i++) {
            fRow += `<td class="col-sum">0</td>`;
        }
        fRow += `<td style="background:#eee"></td></tr>`;
        footer.innerHTML = fRow;

        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        
        // Agregar eventos para recalcular al escribir
        document.querySelectorAll('.cell-input').forEach(input => {
            input.addEventListener('input', calcularTotales);
        });
    }

    function calcularTotales() {
        const rows = document.querySelectorAll('#tableBody tr');
        const nItems = document.querySelectorAll('.item-label').length;
        let colTotals = new Array(nItems).fill(0);

        rows.forEach((row, rowIndex) => {
            let rSum = 0;
            const inputs = row.querySelectorAll('.cell-input');
            inputs.forEach((input, colIndex) => {
                let val = parseInt(input.value) || 0;
                rSum += val;
                colTotals[colIndex] += val;
            });
            row.querySelector('.row-sum').innerText = rSum;
        });

        const colSumCells = document.querySelectorAll('.col-sum');
        colTotals.forEach((total, i) => {
            colSumCells[i].innerText = total;
        });
    }

    function autoOrdenar() {
        calcularTotales();
        const body = document.getElementById('tableBody');
        const headerRow = document.getElementById('headerRow');
        const footer = document.getElementById('footerRow');

        // 1. Ordenar Filas (Sujetos) de mayor a menor puntaje
        let rowsArr = Array.from(body.rows);
        rowsArr.sort((a, b) => {
            return parseInt(b.querySelector('.row-sum').innerText) - parseInt(a.querySelector('.row-sum').innerText);
        });
        rowsArr.forEach(r => body.appendChild(r));

        // 2. Ordenar Columnas (Items) de mayor a menor puntaje
        const itemLabels = document.querySelectorAll('.item-label');
        const colSums = document.querySelectorAll('.col-sum');
        let colsData = [];
        
        for(let i=0; i<itemLabels.length; i++) {
            colsData.push({
                index: i,
                label: itemLabels[i].innerText,
                total: parseInt(colSums[i].innerText)
            });
        }

        colsData.sort((a, b) => b.total - a.total);

        // Reubicar celdas en cada fila basándose en el nuevo orden de columnas
        Array.from(body.rows).forEach(row => {
            const labelCell = row.cells[0];
            const sumCell = row.cells[row.cells.length - 1];
            const dataCells = Array.from(row.cells).slice(1, -1);
            
            row.innerHTML = '';
            row.appendChild(labelCell);
            colsData.forEach(c => row.appendChild(dataCells[c.index]));
            row.appendChild(sumCell);
        });

        // Actualizar cabecera y footer
        colsData.forEach((c, i) => {
            document.querySelectorAll('.item-label')[i].innerText = c.label;
            document.querySelectorAll('.col-sum')[i].innerText = c.total;
        });

        alert("Tabla reestructurada jerárquicamente.");
    }

    /* SEGURIDAD */
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', function(e) {
        if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "u"))) {
            e.preventDefault();
        }
    });
</script>

</body>
</html>
