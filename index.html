<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Análisis Psicométrico</title>
    <style>
        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Degradado estilo Instagram */
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            color: #262626;
        }

        /* CONTENEDOR PRINCIPAL (ESTILO FEED) */
        .welcome-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 450px;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo-placeholder {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            margin: 0 auto 20px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(214, 36, 159, 0.4);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
            color: #262626;
        }

        p {
            color: #8e8e8e;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* BOTONES ESTILO PUBLICACIÓN/HISTORIA */
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            border: 1px solid #dbdbdb;
            padding: 15px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: #262626;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-button:hover {
            background: #fafafa;
            border-color: #a8a8a8;
            transform: scale(1.02);
        }

        .nav-button .icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #efefef;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 18px;
        }

        .nav-button .arrow {
            color: #0095f6;
            font-size: 12px;
        }

        /* FOOTER */
        .footer-text {
            margin-top: 30px;
            font-size: 11px;
            color: #8e8e8e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

<div class="welcome-card">
    <div class="logo-placeholder">Σ</div>
    <h1>Análisis de Datos</h1>
    <p>Selecciona el módulo de cálculo para comenzar</p>

    <div class="nav-menu">
        <a href="guttman.html" class="nav-button">
            <div style="display: flex; align-items: center;">
                <div class="icon">📊</div>
                <span>Escalograma de Guttman</span>
            </div>
            <span class="arrow">VER MÁS</span>
        </a>

        <a href="varianza.html" class="nav-button">
            <div style="display: flex; align-items: center;">
                <div class="icon">📉</div>
                <span>Análisis de Varianza</span>
            </div>
            <span class="arrow">VER MÁS</span>
        </a>

        <a href="alfa.html" class="nav-button">
            <div style="display: flex; align-items: center;">
                <div class="icon">🧬</div>
                <span>Alfa de Cronbach</span>
            </div>
            <span class="arrow">VER MÁS</span>
        </a>
    </div>

    <div class="footer-text">Profe sin aula</div>
</div>

<script>
    /* ---------------------------------------------------------
       SEGURIDAD Y PROTECCIÓN DE CÓDIGO
    --------------------------------------------------------- */

    // 1. Deshabilitar clic derecho
    document.addEventListener('contextmenu', e => e.preventDefault());

    // 2. Bloquear combinaciones de teclas de inspección (F12, Ctrl+Shift+I, etc.)
    document.addEventListener('keydown', function(e) {
        if (
            e.key === "F12" || 
            (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) || 
            (e.ctrlKey && e.key === "u") ||
            (e.ctrlKey && e.key === "s") ||
            (e.metaKey && e.altKey && e.key === "i") // Para Mac
        ) {
            e.preventDefault();
            return false;
        }
    });

    // 3. Anti-Debug: Pausa la ejecución si abren la consola
    setInterval(function() {
        (function() {
            (function a() {
                try {
                    (function b(i) {
                        if (("" + (i / i)).length !== 1 || i % 20 === 0) {
                            (function() {}).constructor("debugger")();
                        } else {
                            debugger;
                        }
                        b(++i);
                    })(0);
                } catch (e) {}
            })();
        })();
    }, 1000);

    // 4. Mensaje disuasorio en consola
    console.log("%c¡ALTO!", "color: red; font-size: 40px; font-weight: bold; -webkit-text-stroke: 1px black;");
    console.log("%cEl acceso a la consola está restringido por políticas de seguridad.", "font-size: 18px;");
</script>

</body>
</html>
